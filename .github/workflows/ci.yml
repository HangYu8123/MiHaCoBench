name: self-check

# MiHaCoBench's own integrity test. Every grader MUST pass on the gold reference
# and FAIL on the deliberately-broken one; `run_benchmark.py --self-check` enforces
# this for every task and exits non-zero if any grader is invalid. Gating every
# push / PR on it means a careless edit to a grader, a gold reference, or a broken
# reference can never silently break the "all graders valid" invariant — and it
# verifies the pinned requirements.txt installs cleanly on a fresh machine.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Authored and self-validated on Python 3.11.5 (see README "Reproducibility").
      - name: Set up Python 3.11.5
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.5"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pinned dependencies
        run: pip install -r requirements.txt

      - name: Preflight (packages importable + complexity-gate status)
        run: python run_benchmark.py --preflight

      - name: Self-check (every grader must pass gold, fail broken)
        run: python run_benchmark.py --self-check
